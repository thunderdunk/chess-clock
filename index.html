<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Chess Clock</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- Player 2 — top, rotated 180° toward them -->
  <div class="panel" id="p2">
    <div class="clock-face">
      <div class="arc-wrap">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <circle class="arc-track" cx="60" cy="60" r="52"/>
          <circle class="arc-fill"  cx="60" cy="60" r="52" id="arc2"/>
        </svg>
      </div>
      <div class="clock-inner">
        <div class="clock-label">Player 2</div>
        <div class="clock-time" id="time2">5:00</div>
      </div>
    </div>
  </div>

  <!-- Control strip -->
  <div id="strip">
    <div class="row" id="presets">
      <button class="btn-preset"          data-min="1"  onclick="selectPreset(1)">1 min</button>
      <button class="btn-preset"          data-min="3"  onclick="selectPreset(3)">3 min</button>
      <button class="btn-preset selected" data-min="5"  onclick="selectPreset(5)">5 min</button>
      <button class="btn-preset"          data-min="10" onclick="selectPreset(10)">10 min</button>
    </div>
    <div class="row">
      <button class="btn-action primary" id="btn-start"  onclick="handleStart()">Start</button>
      <button class="btn-action"         id="btn-pause"  onclick="handlePause()" disabled>Pause</button>
      <button class="btn-action"         id="btn-reset"  onclick="handleReset()">Reset</button>
      <button class="btn-action btn-sound" id="btn-sound" onclick="handleSoundToggle()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
          <path id="sound-path" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
        <span id="sound-label">Sound</span>
      </button>
      <div class="move-count" id="moves">Moves: 0</div>
    </div>
  </div>

  <!-- Player 1 — bottom, right-side up -->
  <div class="panel" id="p1">
    <div class="clock-face">
      <div class="arc-wrap">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <circle class="arc-track" cx="60" cy="60" r="52"/>
          <circle class="arc-fill"  cx="60" cy="60" r="52" id="arc1"/>
        </svg>
      </div>
      <div class="clock-inner">
        <div class="clock-label">Player 1</div>
        <div class="clock-time" id="time1">5:00</div>
      </div>
    </div>
  </div>

</div>
<script src="clock.js"></script>
</body>
</html>
